name: Build and Package Fallout 4 Mod

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (MSVC / Windows x64)
    runs-on: windows-latest
    env:
      # Node.js 24 is the new default as of 2026-06-16; opt in early to silence
      # deprecation warnings from the runner.  Remove once all actions ship
      # Node.js 24 internally and the variable becomes a no-op.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # initialises backend/commonlibf4 and its deps

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── XMake ───────────────────────────────────────────────────────────────
      - name: Install XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # ── Build backend plugin ─────────────────────────────────────────────
      - name: Configure and build PipBoyRemote.dll
        working-directory: backend
        run: |
          xmake config --plat=windows --arch=x64 --mode=release -y
          xmake build PipBoyRemote

      # ── Run unit tests ───────────────────────────────────────────────────
      - name: Build and run unit tests
        working-directory: backend
        run: |
          xmake build PipBoyRemote_Tests
          xmake run  PipBoyRemote_Tests

      # ── Locate DLL ──────────────────────────────────────────────────────
      - name: Locate built DLL
        id: dll
        shell: bash
        run: |
          dll=$(find backend/build -name "PipBoyRemote.dll" | head -1)
          if [[ -z "$dll" ]]; then echo "DLL not found" >&2; exit 1; fi
          echo "path=$dll" >> "$GITHUB_OUTPUT"

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Package mod ZIP ─────────────────────────────────────────────────
      - name: Assemble installable mod package
        shell: bash
        env:
          # Frontend was already built above; skip the redundant npm build inside the script.
          PIPBOY_SKIP_FRONTEND_BUILD: '1'
        run: |
          bash scripts/package-mod.sh "${{ steps.dll.outputs.path }}" build

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload PipBoyRemote.dll
        uses: actions/upload-artifact@v4
        with:
          name: PipBoyRemote-dll
          path: ${{ steps.dll.outputs.path }}
          if-no-files-found: error

      - name: Upload installable mod ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PipBoyRemote-mod
          path: build/PipBoyRemote-mod.zip
          if-no-files-found: error

      # ── Release (on tag push only) ───────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/PipBoyRemote-mod.zip
          generate_release_notes: true
