; PipBoyRemote.ini — Example configuration file
;
; Copy this file to:
;   <Fallout 4 install>\Data\F4SE\Plugins\PipBoyRemote.ini
;
; All keys are optional. Missing keys fall back to the defaults shown below.
; Boolean values: 1 = enabled, 0 = disabled.

[PipBoyRemote]

; Set to 0 to completely disable the plugin without uninstalling it.
; Default: 1
Enable = 1

; TCP port the WebSocket server will listen on.
; Change this if port 11104 conflicts with another application.
; Valid range: 1–65535
; Default: 11104
WebSocketPort = 11104

; IP address to bind the WebSocket server to.
; Use 0.0.0.0 to accept connections from any network interface (required for
; access from a phone or tablet on the same network).
; Use 127.0.0.1 to restrict access to the local machine only.
; Default: 0.0.0.0
BindIP = 0.0.0.0

; Log verbosity sent to the F4SE log file.
; Values: trace | debug | info | warn | error
; Default: info
LogLevel = info
